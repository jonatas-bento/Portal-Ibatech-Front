<div class="usuario-dialog">
  <h2 mat-dialog-title>Editar usuário</h2>
  <p class="subtitle">Atualize os dados e o perfil de acesso deste usuário.</p>
  
  <div *ngIf="carregando()" class="loading">Carregando...</div>

  <form *ngIf="!carregando()" [formGroup]="form" (ngSubmit)="salvar()" autocomplete="off">
    <mat-dialog-content>
      <div class="form-group">
        <label>Nome Completo</label>
        <input formControlName="nomeCompleto" type="text" placeholder="Nome Completo">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input formControlName="email" type="email" placeholder="E-mail" autocomplete="new-email">
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input formControlName="telefone" type="text" placeholder="Telefone">
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input formControlName="cpf" type="text" placeholder="CPF">
      </div>
      <div class="form-group">
        <label>Perfil de Acesso</label>
        <select formControlName="role">
          <option value="" disabled>Selecione um perfil</option>
          <option *ngFor="let role of roleOptions" [value]="role.value">{{ role.label }}</option>
        </select>
      </div>
    </mat-dialog-content>
    <mat-dialog-actions>
      <button type="button" (click)="cancelar()" [disabled]="enviando()">Cancelar</button>
      <button type="submit" [disabled]="enviando() || form.invalid">
        {{ enviando() ? 'Salvando...' : 'Salvar alterações' }}
      </button>
    </mat-dialog-actions>
  </form>
</div>
